# PostgreSQL — Aiven Cloud
spring.datasource.url=jdbc:postgresql://subia-db-miportafolio.d.aivencloud.com:16101/defaultdb?sslmode=require
spring.datasource.username=${AIVEN_DB_USER:avnadmin}
spring.datasource.password=${AIVEN_DB_PASSWORD}

# JPA
spring.jpa.show-sql=false

# Thymeleaf cache activo en prod
spring.thymeleaf.cache=true

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# HikariCP — limitar conexiones para plan gratuito de Aiven
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Port — Render inyecta la variable PORT automáticamente
server.port=${PORT:8081}
