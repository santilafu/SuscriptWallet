# --- Variables requeridas en Render.com (Environment → Add Environment Variable) ---
# GOOGLE_CLIENT_ID     → ID de cliente OAuth de Google Console
# GOOGLE_CLIENT_SECRET → no requerido (usamos verificación de idToken, no redirect)
# ADMIN_EMAIL          → santilafu.dev@gmail.com
# ADMIN_PASSWORD       → contraseña segura del admin (min 10 chars)
# RESEND_API_KEY       → API key de Resend.com
# RESEND_FROM_EMAIL    → noreply@suscriptwallet.com (o el dominio verificado)
# APP_BASE_URL         → https://suscriptwallet.onrender.com
# AIVEN_DB_USER        → avnadmin (o usuario personalizado de Aiven)
# AIVEN_DB_PASSWORD    → contraseña de la base de datos Aiven
# JWT_SECRET           → cadena aleatoria ≥ 32 caracteres

# PostgreSQL — Aiven Cloud
spring.datasource.url=jdbc:postgresql://subia-db-miportafolio.d.aivencloud.com:16101/defaultdb?sslmode=require
spring.datasource.username=${AIVEN_DB_USER:avnadmin}
spring.datasource.password=${AIVEN_DB_PASSWORD}

# JPA
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Thymeleaf cache activo en prod
spring.thymeleaf.cache=true

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# HikariCP — limitar conexiones para plan gratuito de Aiven (max_connections=25, reserva ~5 para superuser)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Port — Render inyecta la variable PORT automáticamente
server.port=${PORT:8081}

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID}

# Admin bootstrap
app.admin.email=${ADMIN_EMAIL:santilafu.dev@gmail.com}
app.admin.password=${ADMIN_PASSWORD}

# Email (Resend)
resend.api-key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:noreply@suscriptwallet.com}
app.base-url=${APP_BASE_URL}

# Spring Session JDBC
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=8h
