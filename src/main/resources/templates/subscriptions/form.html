<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="#{form.title.new}">Suscripción</title></head>
<body>
<div layout:fragment="content">

    <!-- ── Cabecera ───────────────────────────────────────────────────── -->
    <div class="mb-10">
        <h1 class="text-[1.6rem] font-bold text-slate-100 leading-tight" style="letter-spacing:-0.03em;">
            <span th:if="${sub instanceof T(com.subia.model.Subscription) and sub.id > 0}" th:text="#{form.title.edit}">Editar suscripción</span>
            <span th:unless="${sub instanceof T(com.subia.model.Subscription) and sub.id > 0}" th:text="#{form.title.new}">Nueva suscripción</span>
        </h1>
        <p class="text-sm mt-1" style="color:#4a5a78;" th:text="#{form.subtitle}">Completa los datos de tu suscripción</p>
    </div>

    <!-- ── Selector de catálogo (solo al crear) ───────────────────────── -->
    <div class="enter glass-card rounded-xl mb-6 overflow-hidden" style="animation-delay:0ms"
         th:unless="${sub instanceof T(com.subia.model.Subscription) and sub.id > 0}">
        <div class="px-5 py-4 border-b border-white/[0.06] flex items-center gap-2">
            <i class="bi bi-grid-3x3-gap" style="color:#818cf8;"></i>
            <span class="text-sm font-semibold text-slate-200" th:text="#{form.catalog.title}">Elegir del catálogo</span>
            <span class="text-xs text-slate-500 ml-1" th:text="#{form.catalog.optional}">— opcional, rellena el formulario automáticamente</span>
        </div>
        <div class="p-5">
            <div class="flex flex-col sm:flex-row gap-3 items-end">

                <!-- Categoría -->
                <div class="flex-1">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5" th:text="#{form.catalog.category}">Categoría</label>
                    <select id="catalogCategory"
                            class="w-full px-3 py-2 rounded-lg text-sm focus:outline-none transition-all duration-200">
                        <option value="" th:text="#{form.catalog.choose-cat}">— Elige una categoría —</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.icon + ' ' + cat.name}">
                        </option>
                    </select>
                </div>

                <!-- Servicio -->
                <div class="flex-1">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5" th:text="#{form.catalog.service}">Servicio</label>
                    <select id="catalogService" disabled
                            class="w-full px-3 py-2 rounded-lg text-sm focus:outline-none transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <option value="" th:text="#{form.catalog.choose-first}">— Primero elige una categoría —</option>
                    </select>
                </div>

                <!-- Botón Aplicar -->
                <button type="button" id="btnApplyCatalog" disabled
                        class="flex items-center gap-2 px-4 py-2 text-white text-sm font-medium rounded-lg transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer flex-shrink-0"
                        style="background-color:#6366f1;">
                    <i class="bi bi-arrow-down-circle"></i><span th:text="#{form.catalog.apply}">Aplicar</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ── Wizard de 3 pasos ───────────────────────────────────────────── -->

    <!-- Progress bar -->
    <div class="enter glass-card rounded-xl px-6 py-5 mb-6" style="animation-delay:80ms">
        <div class="flex items-center">

            <!-- Paso 1 -->
            <div class="flex flex-col items-center" style="flex:0 0 auto;">
                <div id="step-dot-1"
                     class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold transition-all"
                     style="background:#6366f1;color:#fff;box-shadow:0 0 0 3px rgba(99,102,241,0.2);transition:all 0.2s cubic-bezier(0.4,0,0.2,1);">1</div>
                <span id="step-label-1" class="text-xs mt-1.5 font-semibold" style="color:#818cf8;letter-spacing:0.01em;" th:text="#{form.step.service}">Servicio</span>
            </div>

            <!-- Línea 1-2 -->
            <div id="step-line-1" class="flex-1 mx-3 mb-5" style="height:1px;background:rgba(255,255,255,0.07);transition:background 0.25s cubic-bezier(0.4,0,0.2,1);"></div>

            <!-- Paso 2 -->
            <div class="flex flex-col items-center" style="flex:0 0 auto;">
                <div id="step-dot-2"
                     class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold transition-all"
                     style="background:rgba(255,255,255,0.06);color:#3d4d66;border:1px solid rgba(255,255,255,0.09);transition:all 0.2s cubic-bezier(0.4,0,0.2,1);">2</div>
                <span id="step-label-2" class="text-xs mt-1.5 font-semibold" style="color:#3d4d66;letter-spacing:0.01em;" th:text="#{form.step.price}">Precio</span>
            </div>

            <!-- Línea 2-3 -->
            <div id="step-line-2" class="flex-1 mx-3 mb-5" style="height:1px;background:rgba(255,255,255,0.07);transition:background 0.25s cubic-bezier(0.4,0,0.2,1);"></div>

            <!-- Paso 3 -->
            <div class="flex flex-col items-center" style="flex:0 0 auto;">
                <div id="step-dot-3"
                     class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold transition-all"
                     style="background:rgba(255,255,255,0.06);color:#3d4d66;border:1px solid rgba(255,255,255,0.09);transition:all 0.2s cubic-bezier(0.4,0,0.2,1);">3</div>
                <span id="step-label-3" class="text-xs mt-1.5 font-semibold" style="color:#3d4d66;letter-spacing:0.01em;" th:text="#{form.step.details}">Detalles</span>
            </div>
        </div>
    </div>

    <!-- ── Formulario principal ─────────────────────────────────────────── -->
    <form th:action="${(sub instanceof T(com.subia.model.Subscription) and sub.id > 0)
                        ? '/subscriptions/' + sub.id
                        : '/subscriptions'}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="enter glass-card rounded-xl overflow-hidden" style="animation-delay:160ms">

            <!-- PASO 1: Nombre, descripción, categoría -->
            <div id="wizard-step-1" class="p-6">
                <h2 class="text-base font-semibold text-slate-200 mb-5 flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold"
                          style="background:rgba(99,102,241,0.2); color:#818cf8;">1</span>
                    <span th:text="#{form.step1.title}">Información del servicio</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                            <span th:text="#{form.field.name}">Nombre</span> <span class="text-red-400">*</span>
                        </label>
                        <input type="text" name="name" id="fieldName" required
                               th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.name : ''}"
                               class="w-full px-3 py-2.5 rounded-lg text-sm"
                               th:placeholder="#{form.field.name.placeholder}"/>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5" th:text="#{form.field.description}">Descripción</label>
                        <input type="text" name="description" id="fieldDescription"
                               th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.description : ''}"
                               class="w-full px-3 py-2.5 rounded-lg text-sm"
                               th:placeholder="#{form.field.description.placeholder}"/>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                            <span th:text="#{form.field.category}">Categoría</span> <span class="text-red-400">*</span>
                        </label>
                        <select name="categoryId" id="fieldCategoryId" required
                                class="w-full px-3 py-2.5 rounded-lg text-sm focus:outline-none transition-all duration-200">
                            <option value="" th:text="#{form.field.select}">— Seleccionar —</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.icon + ' ' + cat.name}"
                                    th:selected="${sub instanceof T(com.subia.model.Subscription) and sub.category != null and sub.category.id == cat.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end mt-6">
                    <button type="button" onclick="wizardGoTo(2)"
                            class="flex items-center gap-2 px-5 py-2.5 text-white text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer"
                            style="background-color:#6366f1;">
                        <span th:text="#{form.btn.next}">Siguiente</span> <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- PASO 2: Precio, moneda, ciclo -->
            <div id="wizard-step-2" class="p-6" style="display:none;">
                <h2 class="text-base font-semibold text-slate-200 mb-5 flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold"
                          style="background:rgba(99,102,241,0.2); color:#818cf8;">2</span>
                    <span th:text="#{form.step2.title}">Precio y facturación</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                            <span th:text="#{form.field.price}">Precio</span> <span class="text-red-400">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">€</span>
                            <input type="number" name="price" id="fieldPrice" step="0.01" min="0" required
                                   th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.price : ''}"
                                   class="w-full pl-7 pr-3 py-2.5 rounded-lg text-sm"
                                   th:placeholder="#{form.field.price.placeholder}"/>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5" th:text="#{form.field.currency}">Moneda</label>
                        <select name="currency" id="fieldCurrency"
                                class="w-full px-3 py-2.5 rounded-lg text-sm focus:outline-none transition-all duration-200">
                            <option th:each="cur : ${currencies}"
                                    th:value="${cur.key}"
                                    th:text="${cur.key + '  ' + cur.value}"
                                    th:selected="${(sub instanceof T(com.subia.model.Subscription) ? sub.currency : 'EUR') == cur.key}">
                            </option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                            <span th:text="#{form.field.cycle}">Ciclo</span> <span class="text-red-400">*</span>
                        </label>
                        <select name="billingCycle" id="fieldBillingCycle" required
                                class="w-full px-3 py-2.5 rounded-lg text-sm focus:outline-none transition-all duration-200">
                            <option value="" th:text="#{form.field.select}">— Seleccionar —</option>
                            <option th:each="cycle : ${billingCycles}"
                                    th:value="${cycle}"
                                    th:text="${cycle.name() == 'MONTHLY'} ? #{form.billing.monthly} : (${cycle.name() == 'YEARLY'} ? #{form.billing.yearly} : #{form.billing.weekly})"
                                    th:selected="${sub instanceof T(com.subia.model.Subscription) and sub.billingCycle == cycle}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-between mt-6">
                    <button type="button" onclick="wizardGoTo(1)"
                            class="flex items-center gap-2 px-5 py-2.5 border border-white/[0.1] text-slate-400 hover:text-slate-200 text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer">
                        <i class="bi bi-arrow-left"></i><span th:text="#{form.btn.prev}">Anterior</span>
                    </button>
                    <button type="button" onclick="wizardGoTo(3)"
                            class="flex items-center gap-2 px-5 py-2.5 text-white text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer"
                            style="background-color:#6366f1;">
                        <span th:text="#{form.btn.next}">Siguiente</span> <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- PASO 3: Fecha renovación, estado, notas -->
            <div id="wizard-step-3" class="p-6" style="display:none;">
                <h2 class="text-base font-semibold text-slate-200 mb-5 flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold"
                          style="background:rgba(99,102,241,0.2); color:#818cf8;">3</span>
                    <span th:text="#{form.step3.title}">Detalles adicionales</span>
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                            <span th:text="#{form.field.renewal}">Fecha de renovación</span> <span class="text-red-400">*</span>
                        </label>
                        <input type="date" name="renewalDate" required
                               th:value="${sub instanceof T(com.subia.model.Subscription)
                                           ? sub.renewalDate
                                           : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                               class="w-full px-3 py-2.5 rounded-lg text-sm focus:outline-none transition-all duration-200"/>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5" th:text="#{form.field.notes}">Notas</label>
                        <input type="text" name="notes"
                               th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.notes : ''}"
                               class="w-full px-3 py-2.5 rounded-lg text-sm"
                               th:placeholder="#{form.field.notes.placeholder}"/>
                    </div>

                    <div class="flex flex-col justify-center">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2" th:text="#{form.field.status}">Estado</label>
                        <label class="flex items-center gap-3 cursor-pointer select-none">
                            <input type="checkbox" name="active" value="true"
                                   th:checked="${!(sub instanceof T(com.subia.model.Subscription)) or sub.active}"
                                   id="activeCheck"
                                   class="w-4 h-4 rounded"/>
                            <span class="text-sm text-slate-300" th:text="#{form.field.active}">Suscripción activa</span>
                        </label>
                    </div>
                </div>

                <!-- Trial toggle -->
                <div class="mt-6">
                    <label class="flex items-center gap-3 cursor-pointer select-none">
                        <input type="checkbox" name="isTrial" id="isTrialCheck"
                               class="w-4 h-4 rounded"
                               style="accent-color:#f97316;"
                               onchange="toggleTrial(this.checked)"
                               th:checked="${sub instanceof T(com.subia.model.Subscription) and sub.isTrial}">
                        <span class="text-sm font-medium text-slate-300" th:text="#{form.field.trial}">Período de prueba gratuita</span>
                    </label>
                </div>

                <!-- Trial end date -->
                <div id="trialEndDateDiv" class="mt-4"
                     th:style="${sub instanceof T(com.subia.model.Subscription) and sub.isTrial} ? '' : 'display:none;'">
                    <label class="block text-xs font-medium text-slate-400 mb-1" th:text="#{form.field.trial-end}">Fecha de fin de prueba</label>
                    <input type="date" name="trialEndsAt" id="fieldTrialEndsAt"
                           class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none"
                           th:value="${sub instanceof T(com.subia.model.Subscription) and sub.trialEndsAt != null ? sub.trialEndsAt : ''}">
                </div>

                <div class="flex justify-between mt-6">
                    <button type="button" onclick="wizardGoTo(2)"
                            class="flex items-center gap-2 px-5 py-2.5 border border-white/[0.1] text-slate-400 hover:text-slate-200 text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer">
                        <i class="bi bi-arrow-left"></i><span th:text="#{form.btn.prev}">Anterior</span>
                    </button>
                    <div class="flex items-center gap-3">
                        <a th:href="@{/subscriptions}"
                           class="px-5 py-2.5 border border-white/[0.1] text-slate-400 hover:text-slate-200 text-sm font-medium rounded-lg transition-all duration-200 no-underline"
                           th:text="#{form.btn.cancel}">
                            Cancelar
                        </a>
                        <button type="submit"
                                class="flex items-center gap-2 px-5 py-2.5 text-white text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer"
                                style="background-color:#6366f1;">
                            <i class="bi bi-floppy"></i><span th:text="#{form.btn.save}">Guardar</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </form>

</div>

<!-- ── JavaScript ─────────────────────────────────────────────────────── -->
<th:block layout:fragment="scripts">
<style>
    /* Transición entre pasos del wizard: entrada con leve desplazamiento (ease-out). */
    @keyframes wizardStepEnter {
        from { opacity: 0; transform: translateX(10px); }
        to   { opacity: 1; transform: translateX(0); }
    }
    .wizard-animating { animation: wizardStepEnter 0.28s cubic-bezier(0.23, 1, 0.32, 1); }
    @media (prefers-reduced-motion: reduce) {
        .wizard-animating { animation-duration: 0.01ms !important; }
    }
</style>
<script th:inline="javascript">
var i18n = {
    cycleName: {
        MONTHLY:  /*[[#{form.billing.monthly}]]*/ 'Mensual',
        YEARLY:   /*[[#{form.billing.yearly}]]*/  'Anual',
        WEEKLY:   /*[[#{form.billing.weekly}]]*/  'Semanal'
    },
    loading:     /*[[#{form.catalog.loading}]]*/      '— Cargando… —',
    chooseFirst: /*[[#{form.catalog.choose-first}]]*/  '— Primero elige una categoría —',
    chooseSvc:   /*[[#{form.catalog.choose-svc}]]*/    '— Elige un servicio —',
    loadError:   /*[[#{form.catalog.error}]]*/         '— Error al cargar —'
};
</script>
<script>
(function () {
    'use strict';

    var currentStep = 1;

    window.wizardGoTo = function (step) {
        var prev = document.getElementById('wizard-step-' + currentStep);
        if (prev) prev.style.display = 'none';

        var next = document.getElementById('wizard-step-' + step);
        if (next) {
            next.style.display = '';
            // Re-dispara la animación de entrada del paso (quitar + reflow + añadir).
            next.classList.remove('wizard-animating');
            void next.offsetWidth;
            next.classList.add('wizard-animating');
        }

        for (var i = 1; i <= 3; i++) {
            var dot   = document.getElementById('step-dot-' + i);
            var label = document.getElementById('step-label-' + i);
            if (!dot || !label) continue;

            if (i <= step) {
                dot.style.background   = '#6366f1';
                dot.style.color        = '#fff';
                dot.style.border       = 'none';
                dot.style.boxShadow    = '0 0 0 3px rgba(99,102,241,0.2)';
                label.style.color      = '#818cf8';
            } else {
                dot.style.background   = 'rgba(255,255,255,0.06)';
                dot.style.color        = '#3d4d66';
                dot.style.border       = '1px solid rgba(255,255,255,0.09)';
                dot.style.boxShadow    = 'none';
                label.style.color      = '#3d4d66';
            }
        }

        var line1 = document.getElementById('step-line-1');
        var line2 = document.getElementById('step-line-2');
        if (line1) line1.style.background = step >= 2 ? 'rgba(99,102,241,0.5)' : 'rgba(255,255,255,0.07)';
        if (line2) line2.style.background = step >= 3 ? 'rgba(99,102,241,0.5)' : 'rgba(255,255,255,0.07)';

        currentStep = step;
    };

    window.toggleTrial = function (checked) {
        var div = document.getElementById('trialEndDateDiv');
        if (div) div.style.display = checked ? '' : 'none';
    };

    // ── Selector de catálogo ────────────────────────────────────────────
    var catSelect  = document.getElementById('catalogCategory');
    var svcSelect  = document.getElementById('catalogService');
    var applyBtn   = document.getElementById('btnApplyCatalog');

    var fieldName      = document.getElementById('fieldName');
    var fieldDesc      = document.getElementById('fieldDescription');
    var fieldPrice     = document.getElementById('fieldPrice');
    var fieldCurrency  = document.getElementById('fieldCurrency');
    var fieldCycle     = document.getElementById('fieldBillingCycle');
    var fieldCategoryId= document.getElementById('fieldCategoryId');

    if (!catSelect) return;

    function cycleName(cycle) {
        return (i18n.cycleName[cycle] || cycle).toLowerCase();
    }

    catSelect.addEventListener('change', function () {
        var categoryId = this.value;
        svcSelect.innerHTML = '<option value="">' + i18n.loading + '</option>';
        svcSelect.disabled = true;
        if (applyBtn) applyBtn.disabled = true;

        if (!categoryId) {
            svcSelect.innerHTML = '<option value="">' + i18n.chooseFirst + '</option>';
            return;
        }

        fetch('/api/catalog?categoryId=' + categoryId)
            .then(function (res) { return res.json(); })
            .then(function (response) {
                var items = response.data;
                svcSelect.innerHTML = '<option value="">' + i18n.chooseSvc + '</option>';
                items.forEach(function (item) {
                    var opt = document.createElement('option');
                    opt.value = JSON.stringify(item);
                    opt.textContent = item.name
                        + '  ·  ' + item.price.toFixed(2) + ' ' + item.currency
                        + ' / ' + cycleName(item.billingCycle);
                    svcSelect.appendChild(opt);
                });
                svcSelect.disabled = false;
            })
            .catch(function (err) {
                svcSelect.innerHTML = '<option value="">' + i18n.loadError + '</option>';
                console.error('Error:', err);
            });
    });

    if (svcSelect) {
        svcSelect.addEventListener('change', function () {
            if (applyBtn) applyBtn.disabled = !this.value;
        });
    }

    if (applyBtn) {
        applyBtn.addEventListener('click', function () {
            if (!svcSelect.value) return;
            var item = JSON.parse(svcSelect.value);
            if (fieldName)       fieldName.value       = item.name;
            if (fieldDesc)       fieldDesc.value       = item.description || '';
            if (fieldPrice)      fieldPrice.value      = item.price.toFixed(2);
            if (fieldCurrency)   fieldCurrency.value   = item.currency;
            if (fieldCycle)      fieldCycle.value      = item.billingCycle;
            if (fieldCategoryId) fieldCategoryId.value = catSelect.value;

            if (item.trialDays) {
                var trialCheck = document.getElementById('isTrialCheck');
                if (trialCheck) { trialCheck.checked = true; toggleTrial(true); }
                var endsAt = new Date();
                endsAt.setDate(endsAt.getDate() + item.trialDays);
                var trialField = document.getElementById('fieldTrialEndsAt');
                if (trialField) trialField.value = endsAt.toISOString().slice(0, 10);
            }

            var form = document.querySelector('form');
            if (form) form.scrollIntoView({ behavior: 'smooth' });
        });
    }
}());
</script>
</th:block>

</body>
</html>
