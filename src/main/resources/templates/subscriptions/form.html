<!DOCTYPE html>
<!--
  Formulario de suscripción — Tailwind CSS dark mode + wizard de 3 pasos con Alpine.js
  Selector de catálogo con fetch a /api/catalog
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Suscripción</title></head>
<body>
<div layout:fragment="content">

    <!-- ── Cabecera ───────────────────────────────────────────────────── -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold tracking-tight text-slate-100 flex items-center gap-2">
            <i class="bi bi-credit-card text-accent"></i>
            <span th:if="${sub instanceof T(com.subia.model.Subscription) and sub.id > 0}">Editar suscripción</span>
            <span th:unless="${sub instanceof T(com.subia.model.Subscription) and sub.id > 0}">Nueva suscripción</span>
        </h1>
        <p class="text-sm text-slate-500 mt-1">Completa los datos de tu suscripción</p>
    </div>

    <!-- ── Selector de catálogo (solo al crear) ───────────────────────── -->
    <div class="glass-card rounded-xl mb-6 overflow-hidden"
         th:unless="${sub instanceof T(com.subia.model.Subscription) and sub.id > 0}">
        <div class="px-5 py-4 border-b border-white/[0.06] flex items-center gap-2">
            <i class="bi bi-grid-3x3-gap text-accent"></i>
            <span class="text-sm font-semibold text-slate-200">Elegir del catálogo</span>
            <span class="text-xs text-slate-500 ml-1">— opcional, rellena el formulario automáticamente</span>
        </div>
        <div class="p-5">
            <div class="flex flex-col sm:flex-row gap-3 items-end">

                <!-- Categoría -->
                <div class="flex-1">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Categoría</label>
                    <select id="catalogCategory"
                            class="w-full px-3 py-2 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200">
                        <option value="">— Elige una categoría —</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.icon + ' ' + cat.name}">
                        </option>
                    </select>
                </div>

                <!-- Servicio -->
                <div class="flex-1">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Servicio</label>
                    <select id="catalogService" disabled
                            class="w-full px-3 py-2 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-400 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <option value="">— Primero elige una categoría —</option>
                    </select>
                </div>

                <!-- Botón Aplicar -->
                <button type="button" id="btnApplyCatalog" disabled
                        class="flex items-center gap-2 px-4 py-2 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer flex-shrink-0">
                    <i class="bi bi-arrow-down-circle"></i>Aplicar
                </button>
            </div>
        </div>
    </div>

    <!-- ── Wizard de 3 pasos ───────────────────────────────────────────── -->
    <div x-data="{ step: 1, isTrial: /*[[${sub instanceof T(com.subia.model.Subscription) and sub.isTrial}]]*/ false }">

        <!-- Progress bar de pasos -->
        <div class="glass-card rounded-xl p-5 mb-6">
            <div class="flex items-center gap-0">

                <!-- Paso 1 -->
                <div class="flex flex-col items-center flex-1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-200 border-2"
                         :class="step >= 1 ? 'bg-accent border-accent text-white' : 'border-white/20 text-slate-500'">1</div>
                    <span class="text-xs mt-1.5 font-medium"
                          :class="step >= 1 ? 'text-accent' : 'text-slate-500'">Servicio</span>
                </div>

                <!-- Línea -->
                <div class="flex-1 h-0.5 mb-5 transition-all duration-300"
                     :class="step >= 2 ? 'bg-accent' : 'bg-white/[0.08]'"></div>

                <!-- Paso 2 -->
                <div class="flex flex-col items-center flex-1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-200 border-2"
                         :class="step >= 2 ? 'bg-accent border-accent text-white' : 'border-white/20 text-slate-500'">2</div>
                    <span class="text-xs mt-1.5 font-medium"
                          :class="step >= 2 ? 'text-accent' : 'text-slate-500'">Precio</span>
                </div>

                <!-- Línea -->
                <div class="flex-1 h-0.5 mb-5 transition-all duration-300"
                     :class="step >= 3 ? 'bg-accent' : 'bg-white/[0.08]'"></div>

                <!-- Paso 3 -->
                <div class="flex flex-col items-center flex-1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-200 border-2"
                         :class="step >= 3 ? 'bg-accent border-accent text-white' : 'border-white/20 text-slate-500'">3</div>
                    <span class="text-xs mt-1.5 font-medium"
                          :class="step >= 3 ? 'text-accent' : 'text-slate-500'">Detalles</span>
                </div>
            </div>
        </div>

        <!-- ── Formulario principal ─────────────────────────────────────── -->
        <form th:action="${(sub instanceof T(com.subia.model.Subscription) and sub.id > 0)
                            ? '/subscriptions/' + sub.id
                            : '/subscriptions'}"
              method="post"
              @submit.prevent="$el.submit()">

            <div class="glass-card rounded-xl overflow-hidden">

                <!-- PASO 1: Nombre, descripción, categoría -->
                <div x-show="step === 1" class="p-6">
                    <h2 class="text-base font-semibold text-slate-200 mb-5 flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs flex items-center justify-center font-bold">1</span>
                        Información del servicio
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                        <!-- Nombre -->
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                                Nombre <span class="text-red-400">*</span>
                            </label>
                            <input type="text" name="name" id="fieldName" required
                                   th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.name : ''}"
                                   class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                                   placeholder="Ej: Netflix, Spotify…"/>
                        </div>

                        <!-- Descripción -->
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Descripción</label>
                            <input type="text" name="description" id="fieldDescription"
                                   th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.description : ''}"
                                   class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                                   placeholder="Ej: Plan Premium, 4K…"/>
                        </div>

                        <!-- Categoría -->
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                                Categoría <span class="text-red-400">*</span>
                            </label>
                            <select name="categoryId" id="fieldCategoryId" required
                                    class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200">
                                <option value="">— Seleccionar —</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.icon + ' ' + cat.name}"
                                        th:selected="${sub instanceof T(com.subia.model.Subscription) and sub.category != null and sub.category.id == cat.id}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="flex justify-end mt-6">
                        <button type="button" @click="step = 2"
                                class="flex items-center gap-2 px-5 py-2.5 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer">
                            Siguiente <i class="bi bi-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- PASO 2: Precio, moneda, ciclo de facturación -->
                <div x-show="step === 2" class="p-6">
                    <h2 class="text-base font-semibold text-slate-200 mb-5 flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs flex items-center justify-center font-bold">2</span>
                        Precio y facturación
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                        <!-- Precio -->
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                                Precio <span class="text-red-400">*</span>
                            </label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">€</span>
                                <input type="number" name="price" id="fieldPrice" step="0.01" min="0" required
                                       th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.price : ''}"
                                       class="w-full pl-7 pr-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                                       placeholder="9.99"/>
                            </div>
                        </div>

                        <!-- Moneda (fija EUR) -->
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Moneda</label>
                            <input type="hidden" name="currency" id="fieldCurrency" value="EUR"/>
                            <input type="text" value="EUR €" disabled
                                   class="w-full px-3 py-2.5 bg-elevated/50 border border-white/[0.05] rounded-lg text-sm text-slate-500 cursor-not-allowed"/>
                        </div>

                        <!-- Ciclo de facturación -->
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                                Ciclo <span class="text-red-400">*</span>
                            </label>
                            <select name="billingCycle" id="fieldBillingCycle" required
                                    class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200">
                                <option value="">— Seleccionar —</option>
                                <option th:each="cycle : ${billingCycles}"
                                        th:value="${cycle}"
                                        th:text="${cycle.name() == 'MONTHLY' ? 'Mensual' : (cycle.name() == 'YEARLY' ? 'Anual' : 'Semanal')}"
                                        th:selected="${sub instanceof T(com.subia.model.Subscription) and sub.billingCycle == cycle}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="flex justify-between mt-6">
                        <button type="button" @click="step = 1"
                                class="flex items-center gap-2 px-5 py-2.5 border border-white/[0.1] text-slate-400 hover:text-slate-200 hover:border-white/20 text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer">
                            <i class="bi bi-arrow-left"></i>Anterior
                        </button>
                        <button type="button" @click="step = 3"
                                class="flex items-center gap-2 px-5 py-2.5 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer">
                            Siguiente <i class="bi bi-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- PASO 3: Fecha renovación, estado, notas -->
                <div x-show="step === 3" class="p-6">
                    <h2 class="text-base font-semibold text-slate-200 mb-5 flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs flex items-center justify-center font-bold">3</span>
                        Detalles adicionales
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                        <!-- Fecha de renovación -->
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                                Fecha de renovación <span class="text-red-400">*</span>
                            </label>
                            <input type="date" name="renewalDate" required
                                   th:value="${sub instanceof T(com.subia.model.Subscription)
                                               ? sub.renewalDate
                                               : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                                   class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"/>
                        </div>

                        <!-- Notas -->
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Notas</label>
                            <input type="text" name="notes"
                                   th:value="${sub instanceof T(com.subia.model.Subscription) ? sub.notes : ''}"
                                   class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                                   placeholder="Notas personales opcionales…"/>
                        </div>

                        <!-- Estado activa/inactiva -->
                        <div class="flex flex-col justify-center">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Estado</label>
                            <label class="flex items-center gap-3 cursor-pointer select-none">
                                <input type="checkbox" name="active" value="true"
                                       th:checked="${!(sub instanceof T(com.subia.model.Subscription)) or sub.active}"
                                       id="activeCheck"
                                       class="w-4 h-4 rounded border-white/20 bg-elevated text-accent focus:ring-accent/30"/>
                                <span class="text-sm text-slate-300">Suscripción activa</span>
                            </label>
                        </div>
                    </div>

                    <!-- Trial toggle -->
                    <div class="mt-6">
                        <label class="flex items-center gap-3 cursor-pointer select-none">
                            <input type="checkbox" name="isTrial" x-model="isTrial"
                                   class="w-4 h-4 rounded accent-orange-500"
                                   th:checked="${sub instanceof T(com.subia.model.Subscription) and sub.isTrial}">
                            <span class="text-sm font-medium text-slate-300">Período de prueba gratuita</span>
                        </label>
                    </div>
                    <!-- Trial end date (visible solo si isTrial=true) -->
                    <div x-show="isTrial" x-transition class="mt-4">
                        <label class="block text-xs font-medium text-slate-400 mb-1">Fecha de fin de prueba</label>
                        <input type="date" name="trialEndsAt" id="fieldTrialEndsAt"
                               class="w-full bg-elevated border border-white/10 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-accent/50"
                               th:value="${sub instanceof T(com.subia.model.Subscription) and sub.trialEndsAt != null ? sub.trialEndsAt : ''}">
                    </div>

                    <div class="flex justify-between mt-6">
                        <button type="button" @click="step = 2"
                                class="flex items-center gap-2 px-5 py-2.5 border border-white/[0.1] text-slate-400 hover:text-slate-200 hover:border-white/20 text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer">
                            <i class="bi bi-arrow-left"></i>Anterior
                        </button>
                        <div class="flex items-center gap-3">
                            <a th:href="@{/subscriptions}"
                               class="px-5 py-2.5 border border-white/[0.1] text-slate-400 hover:text-slate-200 hover:border-white/20 text-sm font-medium rounded-lg transition-all duration-200 no-underline">
                                Cancelar
                            </a>
                            <button type="submit"
                                    class="flex items-center gap-2 px-5 py-2.5 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer shadow-lg shadow-accent/20">
                                <i class="bi bi-floppy"></i>Guardar
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </div>

</div>

<!-- ── JavaScript para el selector de catálogo ───────────────────────── -->
<th:block layout:fragment="scripts">
<script th:inline="none">
(function () {
    'use strict';

    const catSelect  = document.getElementById('catalogCategory');
    const svcSelect  = document.getElementById('catalogService');
    const applyBtn   = document.getElementById('btnApplyCatalog');

    const fieldName      = document.getElementById('fieldName');
    const fieldDesc      = document.getElementById('fieldDescription');
    const fieldPrice     = document.getElementById('fieldPrice');
    const fieldCurrency  = document.getElementById('fieldCurrency');
    const fieldCycle     = document.getElementById('fieldBillingCycle');
    const fieldCategoryId= document.getElementById('fieldCategoryId');

    if (!catSelect) return;

    function cycleName(cycle) {
        return { MONTHLY: 'mensual', YEARLY: 'anual', WEEKLY: 'semanal' }[cycle] || cycle;
    }

    catSelect.addEventListener('change', async function () {
        const categoryId = this.value;
        svcSelect.innerHTML = '<option value="">— Cargando… —</option>';
        svcSelect.disabled = true;
        applyBtn.disabled = true;

        if (!categoryId) {
            svcSelect.innerHTML = '<option value="">— Primero elige una categoría —</option>';
            return;
        }

        try {
            const res      = await fetch('/api/catalog?categoryId=' + categoryId);
            const response = await res.json();
            const items    = response.data;

            svcSelect.innerHTML = '<option value="">— Elige un servicio —</option>';
            items.forEach(function (item) {
                const opt = document.createElement('option');
                opt.value = JSON.stringify(item);
                opt.textContent = item.name
                    + '  ·  ' + item.price.toFixed(2) + '\u00a0' + item.currency
                    + ' / ' + cycleName(item.billingCycle);
                svcSelect.appendChild(opt);
            });
            svcSelect.disabled = false;
        } catch (err) {
            svcSelect.innerHTML = '<option value="">— Error al cargar el catálogo —</option>';
            console.error('Error al obtener el catálogo:', err);
        }
    });

    svcSelect.addEventListener('change', function () {
        applyBtn.disabled = !this.value;
    });

    applyBtn.addEventListener('click', function () {
        if (!svcSelect.value) return;
        const item = JSON.parse(svcSelect.value);
        const categoryId = catSelect.value;
        fieldName.value       = item.name;
        fieldDesc.value       = item.description;
        fieldPrice.value      = item.price.toFixed(2);
        fieldCurrency.value   = item.currency;
        fieldCycle.value      = item.billingCycle;
        fieldCategoryId.value = categoryId;
        if (item.trialDays) {
            document.querySelector('[x-data]').__x.$data.isTrial = true;
            const endsAt = new Date();
            endsAt.setDate(endsAt.getDate() + item.trialDays);
            document.getElementById('fieldTrialEndsAt').value = endsAt.toISOString().slice(0, 10);
        }
        document.querySelector('form').scrollIntoView({ behavior: 'smooth' });
    });
}());
</script>
</th:block>

</body>
</html>
