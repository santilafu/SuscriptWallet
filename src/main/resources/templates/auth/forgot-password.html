<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Recuperar contraseña — SusCriptWallet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        base:     '#0a0f1e',
                        surface:  '#111827',
                        elevated: '#1a2235',
                        accent: { DEFAULT: '#6366f1', hover: '#4f46e5' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base text-slate-100 font-sans antialiased min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <a href="/login" class="inline-flex items-center gap-2 font-bold text-2xl no-underline">
            <i class="bi bi-credit-card-2-front text-accent text-3xl"></i>
            <span class="text-accent">SusCript</span><span class="text-slate-100">Wallet</span>
        </a>
    </div>

    <div class="rounded-2xl border border-white/[0.08] p-8" style="background:#111827;">

        <h1 class="text-xl font-semibold mb-2 text-center">Recuperar contraseña</h1>
        <p class="text-slate-400 text-sm text-center mb-6">
            Introduce tu correo y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <!-- Confirmación anti-enumeración -->
        <div th:if="${sent}" class="mb-4 rounded-lg bg-green-500/10 border border-green-500/30 px-4 py-3 text-sm text-green-400">
            <i class="bi bi-check-circle mr-1"></i>
            Si ese correo existe en nuestro sistema, recibirás un enlace en breve.
        </div>

        <form method="POST" th:action="@{/forgot-password}" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Correo electrónico</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                       class="w-full rounded-lg border border-white/[0.12] bg-elevated px-3 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition"
                       placeholder="tu@email.com"/>
            </div>

            <button type="submit"
                    class="w-full rounded-lg bg-accent hover:bg-accent-hover text-white font-medium py-2.5 text-sm transition-colors">
                Enviar enlace
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-400">
            <a href="/login" class="text-accent hover:text-accent-hover no-underline font-medium">
                <i class="bi bi-arrow-left mr-1"></i>Volver al inicio de sesión
            </a>
        </p>
    </div>
</div>

</body>
</html>
