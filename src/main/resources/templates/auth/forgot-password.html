<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Recuperar contraseña — SusCriptWallet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
    <style>
        body { background-color: #0a0f1e; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
        .card { background-color: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; }
        .input-field {
            background-color: #1a2235;
            border: 1px solid rgba(255,255,255,0.12);
            color: #f1f5f9;
            border-radius: 0.5rem;
            padding: 0.625rem 0.75rem;
            font-size: 0.875rem;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .input-field::placeholder { color: #64748b; }
        .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .btn-primary {
            background-color: #6366f1;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .btn-primary:hover { background-color: #4f46e5; }
        .label { display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.25rem; }
        .link-accent { color: #818cf8; text-decoration: none; font-weight: 500; }
        .link-accent:hover { color: #6366f1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <a href="/login" class="inline-flex items-center gap-2 font-bold text-2xl no-underline" style="color:inherit;">
            <i class="bi bi-credit-card-2-front text-3xl" style="color:#818cf8;"></i>
            <span style="color:#818cf8;">SusCript</span><span style="color:#f1f5f9;">Wallet</span>
        </a>
    </div>

    <div class="card p-8">

        <h1 class="text-xl font-semibold mb-2 text-center" style="color:#f1f5f9;">Recuperar contraseña</h1>
        <p class="text-sm text-center mb-6" style="color:#94a3b8;">
            Introduce tu correo y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <!-- Confirmación anti-enumeración -->
        <div th:if="${sent}" class="mb-4 rounded-lg px-4 py-3 text-sm" style="background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#4ade80;">
            <i class="bi bi-check-circle mr-1"></i>
            Si ese correo existe en nuestro sistema, recibirás un enlace en breve.
        </div>

        <form method="POST" th:action="@{/forgot-password}" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label for="email" class="label">Correo electrónico</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                       class="input-field" placeholder="tu@email.com"/>
            </div>

            <button type="submit" class="btn-primary">Enviar enlace</button>
        </form>

        <p class="mt-6 text-center text-sm" style="color:#94a3b8;">
            <a href="/login" class="link-accent">
                <i class="bi bi-arrow-left mr-1"></i>Volver al inicio de sesión
            </a>
        </p>
    </div>
</div>

</body>
</html>
