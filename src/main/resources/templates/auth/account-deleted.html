<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{deleted.title} + ' — SusCriptWallet'">Cuenta eliminada — SusCriptWallet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
    <style>
        body { background-color: #0a0f1e; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
        .card { background-color: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; }
        .btn-accent {
            background-color: #6366f1;
            color: #fff;
            border-radius: 0.5rem;
            padding: 0.625rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.15s;
        }
        .btn-accent:hover { background-color: #4f46e5; color: #fff; }

        /* Entrada escalonada (curva fuerte, ease-out). */
        @keyframes authEnter {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-enter { animation: authEnter 0.45s cubic-bezier(0.23, 1, 0.32, 1) backwards; }
        @media (prefers-reduced-motion: reduce) {
            .auth-enter { animation-duration: 0.01ms !important; transform: none !important; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md">

    <!-- Language switcher -->
    <div class="flex items-center justify-center gap-1 mb-4">
        <i class="bi bi-globe2 text-slate-500 text-xs mr-1"></i>
        <a href="?lang=es" class="px-2 py-0.5 rounded text-xs font-medium transition-all duration-200 no-underline"
           th:classappend="${#locale.language == 'es'} ? 'text-indigo-300' : 'text-slate-500 hover:text-slate-200'"
           th:styleappend="${#locale.language == 'es'} ? 'background:rgba(99,102,241,0.2);' : ''">ES</a>
        <a href="?lang=en" class="px-2 py-0.5 rounded text-xs font-medium transition-all duration-200 no-underline"
           th:classappend="${#locale.language == 'en'} ? 'text-indigo-300' : 'text-slate-500 hover:text-slate-200'"
           th:styleappend="${#locale.language == 'en'} ? 'background:rgba(99,102,241,0.2);' : ''">EN</a>
        <a href="?lang=fr" class="px-2 py-0.5 rounded text-xs font-medium transition-all duration-200 no-underline"
           th:classappend="${#locale.language == 'fr'} ? 'text-indigo-300' : 'text-slate-500 hover:text-slate-200'"
           th:styleappend="${#locale.language == 'fr'} ? 'background:rgba(99,102,241,0.2);' : ''">FR</a>
    </div>

    <!-- Logo -->
    <div class="auth-enter text-center mb-8" style="animation-delay:0ms;">
        <a href="/login" class="inline-flex items-center gap-2 font-bold text-2xl no-underline" style="color:inherit;">
            <i class="bi bi-credit-card-2-front text-3xl" style="color:#818cf8;"></i>
            <span translate="no" style="color:#818cf8;">SusCript</span><span translate="no" style="color:#f1f5f9;">Wallet</span>
        </a>
        <p class="mt-2 text-sm" style="color:#94a3b8;" th:text="#{app.subtitle}">Gestión de suscripciones</p>
    </div>

    <!-- Card -->
    <div class="auth-enter card p-8 text-center" style="animation-delay:80ms;">

        <div class="flex justify-center mb-4">
            <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background:rgba(34,197,94,0.2);">
                <i class="bi bi-check-lg text-3xl" style="color:#4ade80;"></i>
            </div>
        </div>

        <h1 class="text-xl font-semibold mb-3" style="color:#f1f5f9;" th:text="#{deleted.title}">Cuenta eliminada</h1>

        <p class="text-sm mb-6" style="color:#94a3b8;" th:text="#{deleted.text}">
            Tu cuenta ha sido eliminada correctamente. Todos tus datos y suscripciones han sido borrados de forma permanente.
        </p>

        <a href="/login" class="btn-accent">
            <i class="bi bi-arrow-left"></i>
            <span th:text="#{deleted.back}">Volver al inicio</span>
        </a>

    </div>
</div>

</body>
</html>
