<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{reset.title} + ' — SusCriptWallet'">Restablecer contraseña — SusCriptWallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
    <style>
        body { background-color: #0a0f1e; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
        .card { background-color: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; }
        .input-field { background-color: #1a2235; border: 1px solid rgba(255,255,255,0.12); color: #f1f5f9; border-radius: 0.5rem; padding: 0.625rem 0.75rem; font-size: 0.875rem; width: 100%; box-sizing: border-box; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
        .input-field::placeholder { color: #64748b; }
        .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .btn-primary { background-color: #6366f1; color: #fff; border: none; border-radius: 0.5rem; padding: 0.625rem 1rem; font-size: 0.875rem; font-weight: 500; width: 100%; cursor: pointer; transition: background-color 0.15s; }
        .btn-primary:hover { background-color: #4f46e5; }
        .label { display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.25rem; }
        .link-accent { color: #818cf8; text-decoration: none; font-weight: 500; }
        .link-accent:hover { color: #6366f1; }
        .requirements-box { background-color: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 0.5rem; padding: 0.75rem; font-size: 0.75rem; color: #94a3b8; }

        /* Entrada escalonada (curva fuerte, ease-out). */
        @keyframes authEnter {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-enter { animation: authEnter 0.4s cubic-bezier(0.23, 1, 0.32, 1) backwards; }
        @media (prefers-reduced-motion: reduce) {
            .auth-enter { animation-duration: 0.01ms !important; transform: none !important; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
<div class="w-full max-w-md">
    <div class="flex items-center justify-center gap-1 mb-4">
        <i class="bi bi-globe2 text-slate-500 text-xs mr-1"></i>
        <a href="?lang=es" class="px-2 py-0.5 rounded text-xs font-medium transition-all duration-200 no-underline"
           th:classappend="${#locale.language == 'es'} ? 'text-indigo-300' : 'text-slate-500 hover:text-slate-200'"
           th:styleappend="${#locale.language == 'es'} ? 'background:rgba(99,102,241,0.2);' : ''">ES</a>
        <a href="?lang=en" class="px-2 py-0.5 rounded text-xs font-medium transition-all duration-200 no-underline"
           th:classappend="${#locale.language == 'en'} ? 'text-indigo-300' : 'text-slate-500 hover:text-slate-200'"
           th:styleappend="${#locale.language == 'en'} ? 'background:rgba(99,102,241,0.2);' : ''">EN</a>
        <a href="?lang=fr" class="px-2 py-0.5 rounded text-xs font-medium transition-all duration-200 no-underline"
           th:classappend="${#locale.language == 'fr'} ? 'text-indigo-300' : 'text-slate-500 hover:text-slate-200'"
           th:styleappend="${#locale.language == 'fr'} ? 'background:rgba(99,102,241,0.2);' : ''">FR</a>
    </div>
    <div class="auth-enter text-center mb-8" style="animation-delay:0ms;">
        <a href="/login" class="inline-flex items-center gap-2 font-bold text-2xl no-underline" style="color:inherit;">
            <i class="bi bi-credit-card-2-front text-3xl" style="color:#818cf8;"></i>
            <span translate="no" style="color:#818cf8;">SusCript</span><span translate="no" style="color:#f1f5f9;">Wallet</span>
        </a>
    </div>
    <div class="auth-enter card p-8" style="animation-delay:80ms;">
        <h1 class="text-xl font-semibold mb-6 text-center" style="color:#f1f5f9;" th:text="#{reset.title}">Nueva contraseña</h1>
        <div th:if="${error == 'invalidToken'}" class="mb-4 rounded-lg px-4 py-3 text-sm" style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171;">
            <i class="bi bi-exclamation-triangle mr-1"></i> <span th:text="#{reset.error.invalid}">El enlace es inválido o ha expirado.</span>
        </div>
        <div th:if="${error == 'weakPassword'}" class="mb-4 rounded-lg px-4 py-3 text-sm" style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171;">
            <i class="bi bi-exclamation-triangle mr-1"></i> <span th:text="#{reset.error.weak}">La contraseña no cumple los requisitos.</span>
        </div>
        <div th:if="${error == 'passwordMismatch'}" class="mb-4 rounded-lg px-4 py-3 text-sm" style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171;">
            <i class="bi bi-exclamation-triangle mr-1"></i> <span th:text="#{reset.error.mismatch}">Las contraseñas no coinciden.</span>
        </div>
        <form method="POST" th:action="@{/reset-password}" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="token" th:value="${token}"/>
            <div>
                <label for="newPassword" class="label" th:text="#{reset.new-password}">Nueva contraseña</label>
                <input type="password" id="newPassword" name="newPassword" required autocomplete="new-password" class="input-field" placeholder="••••••••••"/>
            </div>
            <div>
                <label for="confirmPassword" class="label" th:text="#{reset.confirm}">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" class="input-field" placeholder="••••••••••"/>
            </div>
            <div class="requirements-box space-y-1">
                <p class="font-medium mb-1" style="color:#cbd5e1;" th:text="#{reset.requirements}">Requisitos:</p>
                <p><i class="bi bi-dot mr-1"></i><span th:text="#{register.req.min}">Mínimo 10 caracteres</span></p>
                <p><i class="bi bi-dot mr-1"></i><span th:text="#{register.req.upper}">Al menos una mayúscula</span></p>
                <p><i class="bi bi-dot mr-1"></i><span th:text="#{register.req.number}">Al menos un número</span></p>
                <p><i class="bi bi-dot mr-1"></i><span th:text="#{register.req.symbol}">Al menos un símbolo</span></p>
            </div>
            <button type="submit" class="btn-primary" th:text="#{reset.submit}">Restablecer contraseña</button>
        </form>
        <p class="auth-enter mt-6 text-center text-sm" style="color:#94a3b8;animation-delay:160ms;">
            <a href="/forgot-password" class="link-accent"><i class="bi bi-arrow-left mr-1"></i><span th:text="#{reset.request-new}">Solicitar nuevo enlace</span></a>
        </p>
    </div>
</div>
</body>
</html>
