<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Verificar correo — SusCriptWallet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
    <style>
        body { background-color: #0a0f1e; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
        .card { background-color: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; }
        .link-accent { color: #818cf8; text-decoration: none; font-weight: 500; }
        .link-accent:hover { color: #6366f1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md text-center">

    <!-- Icono -->
    <div class="mb-8">
        <i class="bi bi-envelope-check text-5xl" style="color:#818cf8;"></i>
    </div>

    <div class="card p-8">
        <h1 class="text-xl font-semibold mb-3" style="color:#f1f5f9;">Revisa tu correo</h1>
        <p class="text-sm mb-6" style="color:#94a3b8;">
            Te hemos enviado un enlace de verificación. Abre tu correo y haz clic en el enlace para activar tu cuenta.
        </p>
        <p class="text-xs mb-6" style="color:#64748b;">
            Si no ves el correo en tu bandeja de entrada, revisa la carpeta de spam.
        </p>
        <a href="/login" class="inline-flex items-center gap-2 text-sm link-accent">
            <i class="bi bi-arrow-left"></i>
            Volver al inicio de sesión
        </a>
    </div>
</div>

</body>
</html>
