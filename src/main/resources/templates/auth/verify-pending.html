<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Verificar correo — SusCriptWallet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        base:     '#0a0f1e',
                        surface:  '#111827',
                        elevated: '#1a2235',
                        accent: { DEFAULT: '#6366f1', hover: '#4f46e5' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base text-slate-100 font-sans antialiased min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md text-center">

    <!-- Logo -->
    <div class="mb-8">
        <i class="bi bi-envelope-check text-accent text-5xl"></i>
    </div>

    <div class="rounded-2xl border border-white/[0.08] p-8" style="background:#111827;">
        <h1 class="text-xl font-semibold mb-3">Revisa tu correo</h1>
        <p class="text-slate-400 text-sm mb-6">
            Te hemos enviado un enlace de verificación. Abre tu correo y haz clic en el enlace para activar tu cuenta.
        </p>
        <p class="text-slate-500 text-xs mb-6">
            Si no ves el correo en tu bandeja de entrada, revisa la carpeta de spam.
        </p>
        <a href="/login"
           class="inline-flex items-center gap-2 text-sm text-accent hover:text-accent-hover no-underline font-medium">
            <i class="bi bi-arrow-left"></i>
            Volver al inicio de sesión
        </a>
    </div>
</div>

</body>
</html>
