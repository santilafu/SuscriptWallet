<!DOCTYPE html>
<!--
  Plantilla base — Tailwind CSS CDN + Alpine.js + dark mode permanente
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:lang="${#locale.language}" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE — SusCriptWallet">SusCriptWallet</title>

    <!-- Tipografía: DM Sans (cuerpo) + DM Mono (monoespaciado) -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

    <!-- Favicons (el SVG es el principal en navegadores modernos; PNG/ICO como respaldo) -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}"/>
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}"/>
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/apple-touch-icon.png}"/>
    <meta name="theme-color" content="#0c1020"/>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- IMPORTANTE: tailwind.config DEBE ir ANTES del script CDN -->
    <script>
        tailwind = window.tailwind || {};
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'system-ui', 'sans-serif'],
                        mono: ['DM Mono', 'ui-monospace', 'monospace']
                    },
                    colors: {
                        base:     '#08091a',
                        surface:  '#0f1629',
                        elevated: '#182038',
                        hover:    '#1e2a47',
                        accent: {
                            DEFAULT: '#6366f1',
                            hover:   '#4f46e5',
                            muted:   '#818cf8'
                        }
                    },
                    boxShadow: {
                        'card':      '0 1px 0 0 rgba(255,255,255,0.04), 0 4px 16px rgba(0,0,0,0.5)',
                        'card-hover':'0 1px 0 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.6)',
                        'accent-glow':'0 0 0 1px rgba(99,102,241,0.4), 0 4px 20px rgba(99,102,241,0.2)'
                    },
                    borderRadius: {
                        'xl2': '1rem',
                        'xl3': '1.25rem'
                    },
                    transitionTimingFunction: {
                        'smooth': 'cubic-bezier(0.4, 0, 0.2, 1)',
                        'spring': 'cubic-bezier(0.34, 1.2, 0.64, 1)'
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
        /* ── Variables CSS ───────────────────────────────────────────────────── */
        :root {
            --accent:         #6366f1;
            --accent-hover:   #4f46e5;
            --accent-light:   #818cf8;
            --surface:        #0f1629;
            --elevated:       #182038;
            --base:           #08091a;
            --border-subtle:  rgba(255,255,255,0.07);
            --border-mid:     rgba(255,255,255,0.12);
            --text-muted:     #64748b;
            --text-secondary: #94a3b8;
            --easing-smooth:  cubic-bezier(0.4, 0, 0.2, 1);
            /* Curvas fuertes (más "punch" que las CSS por defecto) */
            --ease-out:       cubic-bezier(0.23, 1, 0.32, 1);
            --ease-in-out:    cubic-bezier(0.77, 0, 0.175, 1);
        }

        [x-cloak] { display: none !important; }

        /* ── Base ───────────────────────────────────────────────────────────── */
        html, body {
            background-color: var(--base) !important;
            color: #e8edf5 !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Fallbacks custom Tailwind ───────────────────────────────────────── */
        .bg-base     { background-color: var(--base) !important; }
        .bg-surface  { background-color: var(--surface) !important; }
        .bg-elevated { background-color: var(--elevated) !important; }
        .bg-hover    { background-color: #1e2a47 !important; }
        .bg-accent   { background-color: var(--accent) !important; }
        .hover\:bg-accent-hover:hover { background-color: var(--accent-hover) !important; }

        .bg-accent\/10  { background-color: rgba(99,102,241,0.10) !important; }
        .bg-accent\/15  { background-color: rgba(99,102,241,0.15) !important; }
        .bg-accent\/20  { background-color: rgba(99,102,241,0.20) !important; }

        .text-accent { color: var(--accent-light) !important; }
        .hover\:text-accent\/80:hover { color: rgba(129,140,248,0.8) !important; }

        .border-accent      { border-color: var(--accent) !important; }
        .border-accent\/60  { border-color: rgba(99,102,241,0.60) !important; }
        .border-accent\/40  { border-color: rgba(99,102,241,0.40) !important; }
        .hover\:border-accent\/40:hover { border-color: rgba(99,102,241,0.40) !important; }

        .focus\:border-accent\/60:focus { border-color: rgba(99,102,241,0.60) !important; }
        .focus\:ring-accent\/30:focus   { box-shadow: 0 0 0 3px rgba(99,102,241,0.25) !important; }

        /* ── Campos de formulario ────────────────────────────────────────────── */
        input:not([type=checkbox]):not([type=radio]):not([type=color]),
        select,
        textarea {
            background-color: var(--elevated) !important;
            color: #e8edf5 !important;
            border-color: var(--border-mid) !important;
            transition: border-color 0.15s var(--easing-smooth),
                        box-shadow 0.15s var(--easing-smooth) !important;
        }
        input::placeholder, textarea::placeholder { color: #4a5568 !important; }
        input:disabled, select:disabled, textarea:disabled {
            background-color: rgba(24,32,56,0.5) !important;
            color: var(--text-muted) !important;
            opacity: 0.6 !important;
        }
        input:focus:not([type=checkbox]):not([type=radio]),
        select:focus, textarea:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.22) !important;
            outline: none !important;
        }
        input[type=date]::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.4);
        }
        input[type=color] { padding: 2px; cursor: pointer; }

        /* ── Glass card — refinado ───────────────────────────────────────────── */
        .glass-card {
            background: linear-gradient(
                145deg,
                rgba(255,255,255,0.035) 0%,
                rgba(255,255,255,0.018) 100%
            ) !important;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            box-shadow:
                0 1px 0 0 rgba(255,255,255,0.05),
                0 4px 20px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.04);
            transition: box-shadow 0.2s var(--easing-smooth),
                        transform 0.2s var(--easing-smooth),
                        border-color 0.2s var(--easing-smooth);
        }
        .glass-card:hover {
            border-color: rgba(255,255,255,0.10);
            box-shadow:
                0 1px 0 0 rgba(255,255,255,0.07),
                0 8px 32px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* ── Animación de entrada ────────────────────────────────────────────── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .page-content {
            animation: fadeInUp 0.22s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        /* ── Lista de suscripciones: entrada escalonada (stagger) ────────────── */
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        /* `backwards`: aplica el estado inicial durante el delay (sin parpadeo) y, al
           terminar, libera la propiedad para que el filtrado pueda animar la opacidad. */
        .sub-card { animation: cardEnter 0.34s var(--ease-out) backwards; }

        /* Salida al filtrar: se desvanece y encoge antes de colapsar el hueco. */
        .sub-card.is-hiding {
            opacity: 0;
            transform: scale(0.97);
            transition: opacity 0.14s var(--ease-out), transform 0.14s var(--ease-out);
            pointer-events: none;
        }

        /* Hover solo en dispositivos con puntero fino (evita falsos positivos táctiles). */
        @media (hover: hover) and (pointer: fine) {
            .sub-card:hover {
                transform: translateY(-3px);
                border-color: rgba(99,102,241,0.22) !important;
                box-shadow:
                    0 1px 0 0 rgba(255,255,255,0.07),
                    0 14px 42px rgba(0,0,0,0.6),
                    0 0 0 1px rgba(99,102,241,0.12),
                    inset 0 1px 0 rgba(255,255,255,0.06) !important;
            }
        }

        /* ── Indicador "Activa": pulso lento de baja frecuencia ──────────────── */
        @keyframes statusPulse {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%      { transform: scale(1.6); opacity: 0.45; }
        }
        .status-dot-active { animation: statusPulse 2.6s var(--easing-smooth) infinite; }

        /* ── Pills de filtro (estado por clase, no por estilos inline en JS) ──── */
        .filter-pill {
            border-color: rgba(255,255,255,0.08);
            background: transparent;
            color: #64748b;
            transition: color 0.15s ease, background-color 0.15s ease,
                        border-color 0.15s ease, transform 0.1s var(--ease-out);
        }
        .filter-pill:active { transform: scale(0.96); }
        .filter-pill.active {
            border-color: rgba(99,102,241,0.5) !important;
            background: rgba(99,102,241,0.12) !important;
            color: #a5b4fc !important;
        }

        /* ── Botones de acción de tarjeta (hover por CSS + feedback al pulsar) ── */
        .card-action {
            transition: color 0.15s ease, background-color 0.15s ease,
                        border-color 0.15s ease, transform 0.1s var(--ease-out);
        }
        .card-action:active { transform: scale(0.97); }
        .card-action.edit:hover   { color:#cbd5e1; background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.12); }
        .card-action.cancel:hover { color:#fb923c; background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.3); }
        .card-action.delete:hover { color:#f87171; background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.3); }

        /* ── Movimiento reducido: conserva la opacidad, elimina el desplazamiento ── */
        @media (prefers-reduced-motion: reduce) {
            .page-content, .sub-card { animation-duration: 0.01ms !important; transform: none !important; }
            .sub-card.is-hiding { transform: none !important; }
            .status-dot-active  { animation: none !important; }
            @media (hover: hover) and (pointer: fine) {
                .sub-card:hover { transform: none !important; }
            }
        }

        /* ── Scrollbar refinada ──────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(99,102,241,0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99,102,241,0.35);
        }

        /* ── Botones accent ──────────────────────────────────────────────────── */
        a.bg-accent, button.bg-accent {
            color: #fff !important;
            box-shadow: 0 1px 8px rgba(99,102,241,0.35);
            transition: background-color 0.15s var(--easing-smooth),
                        box-shadow 0.15s var(--easing-smooth),
                        transform 0.1s var(--easing-smooth) !important;
        }
        a.bg-accent:hover, button.bg-accent:hover,
        a.hover\:bg-accent-hover:hover, button.hover\:bg-accent-hover:hover {
            background-color: var(--accent-hover) !important;
            box-shadow: 0 2px 12px rgba(99,102,241,0.5) !important;
            color: #fff !important;
        }
        a.bg-accent:active, button.bg-accent:active {
            transform: scale(0.975) !important;
        }

        /* ── Navbar links ────────────────────────────────────────────────────── */
        nav a, nav button {
            transition: color 0.15s var(--easing-smooth),
                        background 0.15s var(--easing-smooth) !important;
        }

        /* ── Tabla rows ──────────────────────────────────────────────────────── */
        tbody tr {
            transition: background-color 0.12s var(--easing-smooth);
        }

        /* ── Separador fino entre secciones ──────────────────────────────────── */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                var(--border-subtle) 20%,
                var(--border-subtle) 80%,
                transparent 100%
            );
        }

        /* ── Tipografía: tracking ajustado ───────────────────────────────────── */
        h1 { letter-spacing: -0.025em; }
        h2 { letter-spacing: -0.015em; }

        /* ── Etiquetas de campo en formularios ───────────────────────────────── */
        .field-label {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Alpine.js cloak */
        [x-cloak] { display: none !important; }

        /* line-clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Números/importes: monoespaciado ─────────────────────────────────── */
        .tabular-num {
            font-family: 'DM Mono', ui-monospace, monospace;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-base text-slate-100 font-sans antialiased min-h-screen flex flex-col">

<!-- ── Navbar ─────────────────────────────────────────────────────────── -->
<nav class="sticky top-0 z-50" style="background:rgba(8,9,26,0.92); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.06);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-[3.5rem]">

            <!-- Logo -->
            <a th:href="@{/dashboard}"
               class="flex items-center gap-2.5 font-bold text-base tracking-tight no-underline group" style="color:inherit;">
                <div style="width:28px;height:28px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all 0.25s var(--ease-spring,cubic-bezier(0.34,1.2,0.64,1));"
                     class="group-hover:scale-105">
                    <svg width="17" height="17" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"
                         class="brand-mark transition-transform duration-500 ease-out group-hover:rotate-180">
                        <defs>
                            <linearGradient id="swNav" x1="0" y1="0" x2="16" y2="16" gradientUnits="userSpaceOnUse">
                                <stop offset="0" stop-color="#a5b4fc"/>
                                <stop offset="1" stop-color="#6366f1"/>
                            </linearGradient>
                        </defs>
                        <g fill="url(#swNav)">
                            <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41m-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9"/>
                            <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3M3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9z"/>
                        </g>
                    </svg>
                </div>
                <span translate="no" class="font-bold" style="color:#e8edf5;letter-spacing:-0.02em;">Suscript</span><span translate="no" class="font-normal" style="color:#6b7a99;letter-spacing:-0.02em;">Wallet</span>
            </a>

            <!-- Nav links -->
            <div class="flex items-center gap-0.5">
                <a th:href="@{/dashboard}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium no-underline"
                   th:classappend="${currentPath == '/dashboard'}
                       ? ' bg-accent/10'
                       : ' text-slate-400 hover:text-slate-200 hover:bg-white/[0.05]'"
                   th:style="${currentPath == '/dashboard'} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-speedometer2 text-xs"></i>
                    <span th:text="#{nav.dashboard}">Dashboard</span>
                </a>
                <a th:href="@{/subscriptions}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/subscriptions')}
                       ? ' bg-accent/10'
                       : ' text-slate-400 hover:text-slate-200 hover:bg-white/[0.05]'"
                   th:style="${currentPath != null and currentPath.startsWith('/subscriptions')} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-list-ul text-xs"></i>
                    <span th:text="#{nav.subscriptions}">Suscripciones</span>
                </a>
                <a th:href="@{/categories}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/categories')}
                       ? ' bg-accent/10'
                       : ' text-slate-400 hover:text-slate-200 hover:bg-white/[0.05]'"
                   th:style="${currentPath != null and currentPath.startsWith('/categories')} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-tags text-xs"></i>
                    <span th:text="#{nav.categories}">Categorías</span>
                </a>
                <a th:href="@{/catalog-browser}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/catalog-browser')}
                       ? ' bg-accent/10'
                       : ' text-slate-400 hover:text-slate-200 hover:bg-white/[0.05]'"
                   th:style="${currentPath != null and currentPath.startsWith('/catalog-browser')} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-grid-3x3-gap text-xs"></i>
                    <span th:text="#{nav.catalog}">Catálogo</span>
                </a>
                <a th:href="@{/settings}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/settings')}
                       ? ' bg-accent/10'
                       : ' text-slate-400 hover:text-slate-200 hover:bg-white/[0.05]'"
                   th:style="${currentPath != null and currentPath.startsWith('/settings')} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-gear text-xs"></i>
                    <span th:text="#{nav.settings}">Ajustes</span>
                </a>

                <!-- Separador visual -->
                <div style="width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 6px;"></div>

                <!-- Language selector -->
                <div class="flex items-center gap-0.5 px-1.5 py-1 rounded-lg" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);">
                    <a th:href="@{''(lang='es')}"
                       class="px-1.5 py-0.5 rounded text-xs font-semibold no-underline tracking-wide transition-all"
                       th:classappend="${#locale.language == 'es'} ? 'text-indigo-300' : 'text-slate-600 hover:text-slate-300'"
                       th:styleappend="${#locale.language == 'es'} ? 'background:rgba(99,102,241,0.18);' : ''">ES</a>
                    <a th:href="@{''(lang='en')}"
                       class="px-1.5 py-0.5 rounded text-xs font-semibold no-underline tracking-wide transition-all"
                       th:classappend="${#locale.language == 'en'} ? 'text-indigo-300' : 'text-slate-600 hover:text-slate-300'"
                       th:styleappend="${#locale.language == 'en'} ? 'background:rgba(99,102,241,0.18);' : ''">EN</a>
                    <a th:href="@{''(lang='fr')}"
                       class="px-1.5 py-0.5 rounded text-xs font-semibold no-underline tracking-wide transition-all"
                       th:classappend="${#locale.language == 'fr'} ? 'text-indigo-300' : 'text-slate-600 hover:text-slate-300'"
                       th:styleappend="${#locale.language == 'fr'} ? 'background:rgba(99,102,241,0.18);' : ''">FR</a>
                </div>

                <a th:href="@{/delete-account}"
                   class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-sm font-medium no-underline text-slate-500 hover:text-red-400 hover:bg-red-500/[0.06] transition-all">
                    <i class="bi bi-person-x text-xs"></i>
                    <span class="hidden sm:inline" th:text="#{nav.delete-account}">Eliminar cuenta</span>
                </a>

                <form method="POST" th:action="@{/logout}" class="ml-0.5">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-200 hover:bg-white/[0.05]">
                        <i class="bi bi-box-arrow-right text-xs"></i>
                        <span th:text="#{nav.logout}">Cerrar sesión</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- ── Contenido principal ────────────────────────────────────────────── -->
<main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 page-content"
      layout:fragment="content">
    <!-- Cada página inyecta aquí su contenido -->
</main>

<!-- ── Footer ─────────────────────────────────────────────────────────── -->
<footer class="mt-auto py-6" style="border-top:1px solid rgba(255,255,255,0.05);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs" style="color:#3d4d66;">
        <span th:text="#{footer.text}">SusCriptWallet — Gestión de suscripciones</span>
