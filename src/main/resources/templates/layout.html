<!DOCTYPE html>
<!--
  Plantilla base — Tailwind CSS CDN + Alpine.js + dark mode permanente
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE — SusCriptWallet">SusCriptWallet</title>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- Tailwind CDN con config dark mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        base:     '#0a0f1e',
                        surface:  '#111827',
                        elevated: '#1a2235',
                        hover:    '#1e2d45',
                        accent: {
                            DEFAULT: '#6366f1',
                            hover:   '#4f46e5'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
        /* Scrollbar dark */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0f1e; }
        ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }

        /* Animación de entrada */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .page-content { animation: fadeInUp 0.25s ease both; }

        /* Glassmorphism stat cards */
        .glass-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 4px 24px rgba(0,0,0,0.4);
        }

        /* Input / select dark override para compatibilidad con Tailwind CDN */
        input[type=date]::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.5);
        }
        input[type=color] {
            padding: 2px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-base text-slate-100 font-sans antialiased min-h-screen flex flex-col">

<!-- ── Navbar ─────────────────────────────────────────────────────────── -->
<nav class="sticky top-0 z-50 border-b border-white/[0.08]" style="background:#0a0f1e;">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-14">

            <!-- Logo -->
            <a th:href="@{/dashboard}"
               class="flex items-center gap-2 font-bold text-lg tracking-tight no-underline">
                <i class="bi bi-credit-card-2-front text-accent text-xl"></i>
                <span class="text-accent">SusCript</span><span class="text-slate-100">Wallet</span>
            </a>

            <!-- Nav links -->
            <div class="flex items-center gap-1">
                <a th:href="@{/dashboard}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath == '/dashboard'}
                       ? ' text-accent border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/subscriptions}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/subscriptions')}
                       ? ' text-accent border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'">
                    <i class="bi bi-list-ul"></i>
                    <span>Suscripciones</span>
                </a>
                <a th:href="@{/categories}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/categories')}
                       ? ' text-accent border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'">
                    <i class="bi bi-tags"></i>
                    <span>Categorías</span>
                </a>
                <a th:href="@{/catalog-browser}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/catalog-browser')}
                       ? ' text-accent border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'">
                    <i class="bi bi-grid-3x3-gap"></i>
                    <span>Catálogo</span>
                </a>

                <!-- Eliminar cuenta -->
                <a th:href="@{/delete-account}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline text-slate-400 hover:text-red-400 hover:bg-red-500/[0.06]">
                    <i class="bi bi-person-x"></i>
                    <span class="hidden sm:inline">Eliminar cuenta</span>
                </a>

                <!-- Logout -->
                <form method="POST" th:action="@{/logout}" class="ml-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>Cerrar sesión</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- ── Contenido principal ────────────────────────────────────────────── -->
<main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 page-content"
      layout:fragment="content">
    <!-- Cada página inyecta aquí su contenido -->
</main>

<!-- ── Footer ─────────────────────────────────────────────────────────── -->
<footer class="border-t border-white/[0.06] mt-auto py-5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-slate-500">
        <i class="bi bi-credit-card-2-front mr-1"></i>
        SusCriptWallet &mdash; Gestión de suscripciones · Precios actualizados a marzo 2026
    </div>
</footer>

<!-- Punto de extensión para scripts adicionales de cada página -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
