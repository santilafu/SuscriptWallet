<!DOCTYPE html>
<!--
  Plantilla base — Tailwind CSS CDN + Alpine.js + dark mode permanente
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE — SusCriptWallet">SusCriptWallet</title>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}"/>
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}"/>
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/apple-touch-icon.png}"/>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- IMPORTANTE: tailwind.config DEBE ir ANTES del script CDN -->
    <script>
        tailwind = window.tailwind || {};
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        base:     '#0a0f1e',
                        surface:  '#111827',
                        elevated: '#1a2235',
                        hover:    '#1e2d45',
                        accent: {
                            DEFAULT: '#6366f1',
                            hover:   '#4f46e5'
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
        /* ── Variables CSS (usadas como fallback si Tailwind custom no carga) ── */
        :root {
            --accent:         #6366f1;
            --accent-hover:   #4f46e5;
            --accent-light:   #818cf8;
            --surface:        #111827;
            --elevated:       #1a2235;
            --base:           #0a0f1e;
        }

        /* ── Base: fondo y texto siempre oscuro ─────────────────────────────── */
        html, body { background-color: var(--base) !important; color: #f1f5f9 !important; }

        /* ── Fallbacks para custom Tailwind classes ──────────────────────────── */
        /* Backgrounds */
        .bg-base     { background-color: var(--base) !important; }
        .bg-surface  { background-color: var(--surface) !important; }
        .bg-elevated { background-color: var(--elevated) !important; }
        .bg-hover    { background-color: #1e2d45 !important; }
        .bg-accent   { background-color: var(--accent) !important; }
        .hover\:bg-accent-hover:hover { background-color: var(--accent-hover) !important; }

        /* Opacity variants de accent */
        .bg-accent\/10  { background-color: rgba(99,102,241,0.10) !important; }
        .bg-accent\/15  { background-color: rgba(99,102,241,0.15) !important; }
        .bg-accent\/20  { background-color: rgba(99,102,241,0.20) !important; }

        /* Text */
        .text-accent { color: var(--accent-light) !important; }
        .hover\:text-accent\/80:hover { color: rgba(99,102,241,0.8) !important; }

        /* Borders */
        .border-accent      { border-color: var(--accent) !important; }
        .border-accent\/60  { border-color: rgba(99,102,241,0.60) !important; }
        .border-accent\/40  { border-color: rgba(99,102,241,0.40) !important; }
        .hover\:border-accent\/40:hover { border-color: rgba(99,102,241,0.40) !important; }

        /* Focus states */
        .focus\:border-accent\/60:focus { border-color: rgba(99,102,241,0.60) !important; }
        .focus\:ring-accent\/30:focus   { box-shadow: 0 0 0 3px rgba(99,102,241,0.30) !important; }

        /* ── Elementos de formulario siempre oscuros ─────────────────────────── */
        input:not([type=checkbox]):not([type=radio]):not([type=color]),
        select,
        textarea {
            background-color: var(--elevated) !important;
            color: #f1f5f9 !important;
            border-color: rgba(255,255,255,0.12) !important;
        }
        input::placeholder, textarea::placeholder { color: #64748b !important; }
        input:disabled, select:disabled, textarea:disabled {
            background-color: rgba(26,34,53,0.5) !important;
            color: #64748b !important;
        }
        input:focus:not([type=checkbox]):not([type=radio]),
        select:focus, textarea:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.25) !important;
            outline: none !important;
        }

        /* Date picker icon visible en dark */
        input[type=date]::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.5);
        }
        input[type=color] { padding: 2px; cursor: pointer; }

        /* ── Glassmorphism stat cards ─────────────────────────────────────────── */
        .glass-card {
            background: rgba(255,255,255,0.03) !important;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 4px 24px rgba(0,0,0,0.4);
        }

        /* ── Animación de entrada ─────────────────────────────────────────────── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .page-content { animation: fadeInUp 0.25s ease both; }

        /* ── Scrollbar dark ───────────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--base); }
        ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }

        /* ── Botones accent (clase helper) ───────────────────────────────────── */
        a.bg-accent, button.bg-accent {
            color: #fff !important;
        }
        a.bg-accent:hover, button.bg-accent:hover,
        a.hover\:bg-accent-hover:hover, button.hover\:bg-accent-hover:hover {
            background-color: var(--accent-hover) !important;
            color: #fff !important;
        }

        /* Alpine.js cloak */
        [x-cloak] { display: none !important; }

        /* line-clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-base text-slate-100 font-sans antialiased min-h-screen flex flex-col">

<!-- ── Navbar ─────────────────────────────────────────────────────────── -->
<nav class="sticky top-0 z-50 border-b border-white/[0.08]" style="background:#0a0f1e;">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-14">

            <!-- Logo -->
            <a th:href="@{/dashboard}"
               class="flex items-center gap-2 font-bold text-lg tracking-tight no-underline" style="color:inherit;">
                <i class="bi bi-credit-card-2-front text-xl" style="color:#818cf8;"></i>
                <span style="color:#818cf8;">SusCript</span><span style="color:#f1f5f9;">Wallet</span>
            </a>

            <!-- Nav links -->
            <div class="flex items-center gap-1">
                <a th:href="@{/dashboard}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath == '/dashboard'}
                       ? ' border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'"
                   th:style="${currentPath == '/dashboard'} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/subscriptions}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/subscriptions')}
                       ? ' border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'"
                   th:style="${currentPath != null and currentPath.startsWith('/subscriptions')} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-list-ul"></i>
                    <span>Suscripciones</span>
                </a>
                <a th:href="@{/categories}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/categories')}
                       ? ' border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'"
                   th:style="${currentPath != null and currentPath.startsWith('/categories')} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-tags"></i>
                    <span>Categorías</span>
                </a>
                <a th:href="@{/catalog-browser}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline"
                   th:classappend="${currentPath != null and currentPath.startsWith('/catalog-browser')}
                       ? ' border-b-2 border-accent bg-accent/10'
                       : ' text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]'"
                   th:style="${currentPath != null and currentPath.startsWith('/catalog-browser')} ? 'color:#818cf8;' : ''">
                    <i class="bi bi-grid-3x3-gap"></i>
                    <span>Catálogo</span>
                </a>

                <!-- Eliminar cuenta -->
                <a th:href="@{/delete-account}"
                   class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 no-underline text-slate-400 hover:text-red-400 hover:bg-red-500/[0.06]">
                    <i class="bi bi-person-x"></i>
                    <span class="hidden sm:inline">Eliminar cuenta</span>
                </a>

                <!-- Logout -->
                <form method="POST" th:action="@{/logout}" class="ml-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200 text-slate-400 hover:text-slate-100 hover:bg-white/[0.06]">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>Cerrar sesión</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- ── Contenido principal ────────────────────────────────────────────── -->
<main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 page-content"
      layout:fragment="content">
    <!-- Cada página inyecta aquí su contenido -->
</main>

<!-- ── Footer ─────────────────────────────────────────────────────────── -->
<footer class="border-t border-white/[0.06] mt-auto py-5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-slate-500">
        <i class="bi bi-credit-card-2-front mr-1"></i>
        SusCriptWallet &mdash; Gestión de suscripciones · Precios actualizados a marzo 2026
    </div>
</footer>

<!-- Punto de extensión para scripts adicionales de cada página -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
