<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="#{catalog.title}">Catálogo</title></head>
<body>
<div layout:fragment="content">

    <!-- ── Cabecera ──────────────────────────────────────────────────── -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-100 flex items-center gap-2">
                <i class="bi bi-grid-3x3-gap text-accent"></i>
                <span th:text="#{catalog.title}">Catálogo de servicios</span>
            </h1>
            <p class="text-sm text-slate-500 mt-0.5">
                <span th:text="#{catalog.count(${allItems.size()})}"></span>
            </p>
        </div>
        <a th:href="@{/subscriptions/new}"
           class="flex items-center gap-2 px-4 py-2 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 no-underline shadow-lg shadow-accent/20">
            <i class="bi bi-plus-lg"></i><span th:text="#{catalog.new-manual}">Nueva manual</span>
        </a>
    </div>

    <!-- ── Barra de búsqueda + chips de categoría ─────────────────────── -->
    <div class="glass-card rounded-xl p-4 mb-6">
        <div class="flex flex-col gap-4">

            <!-- Búsqueda -->
            <div class="relative w-full sm:w-96">
                <i class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none text-sm"></i>
                <input type="text" id="catalogSearch"
                       class="w-full pl-9 pr-4 py-2 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                       th:placeholder="#{catalog.search}"
                       autocomplete="off"/>
            </div>

            <!-- Chips de categoría -->
            <div class="flex flex-wrap gap-2">
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer active"
                        data-cat="" onclick="setCatalogCat(this, '')"
                        th:text="#{catalog.filter.all}">Todos</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="ia" onclick="setCatalogCat(this, 'ia')"
                        th:text="'🤖 ' + #{catalog.chip.ia}">🤖 IA</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="streaming" onclick="setCatalogCat(this, 'streaming')"
                        th:text="'📺 ' + #{catalog.chip.streaming}">📺 Streaming</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="musica" onclick="setCatalogCat(this, 'musica')"
                        th:text="'🎵 ' + #{catalog.chip.musica}">🎵 Música</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="software" onclick="setCatalogCat(this, 'software')"
                        th:text="'💼 ' + #{catalog.chip.software}">💼 Software</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="cloud" onclick="setCatalogCat(this, 'cloud')"
                        th:text="'☁️ ' + #{catalog.chip.cloud}">☁️ Cloud</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="gaming" onclick="setCatalogCat(this, 'gaming')"
                        th:text="'🎮 ' + #{catalog.chip.gaming}">🎮 Gaming</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="seguridad" onclick="setCatalogCat(this, 'seguridad')"
                        th:text="'🔒 ' + #{catalog.chip.seguridad}">🔒 Seguridad</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="noticias" onclick="setCatalogCat(this, 'noticias')"
                        th:text="'📰 ' + #{catalog.chip.noticias}">📰 Noticias</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="salud" onclick="setCatalogCat(this, 'salud')"
                        th:text="'🏃 ' + #{catalog.chip.salud}">🏃 Salud</button>
                <button type="button" class="filter-pill px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="desarrollo" onclick="setCatalogCat(this, 'desarrollo')"
                        th:text="'💻 ' + #{catalog.chip.desarrollo}">💻 Desarrollo</button>
                <button type="button" class="filter-pill filter-pill-trial px-3 py-1 rounded-full text-xs font-medium border cursor-pointer"
                        data-cat="prueba" onclick="setCatalogCat(this, 'prueba')"
                        th:text="'🆓 ' + #{catalog.chip.prueba}">🆓 Pruebas gratuitas</button>
            </div>
        </div>
    </div>

    <!-- ── Grid de cards ──────────────────────────────────────────────── -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="catalogGrid">

        <div th:each="item, iterStat : ${allItems}"
             th:attr="data-name=${#strings.toLowerCase(item.name)},data-cat=${item.categoryKey}"
             class="catalog-card sub-card glass-card rounded-xl overflow-hidden flex flex-col"
             th:style="'animation-delay:' + ${(iterStat.index % 24) * 35} + 'ms'">

            <div class="flex flex-col flex-1 p-5">

                <!-- Header: logo + nombre + badge prueba -->
                <div class="flex items-start gap-3 mb-3">

                    <!-- Logo -->
                    <div class="w-10 h-10 rounded-xl flex-shrink-0 bg-elevated flex items-center justify-center overflow-hidden border border-white/[0.06]">
                        <img th:if="${item.domain != null}"
                             th:src="'https://icon.horse/icon/' + ${item.domain}"
                             class="w-8 h-8 object-contain"
                             th:alt="${item.name}"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <span th:text="${item.name.substring(0,1).toUpperCase()}"
                              th:style="${item.domain != null} ? 'display:none' : 'display:flex'"
                              class="w-full h-full items-center justify-center text-sm font-bold text-accent"></span>
                    </div>

                    <!-- Nombre y descripción -->
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h3 class="font-semibold text-slate-100 text-sm leading-tight"
                                th:text="${item.name}"></h3>
                            <!-- Badge prueba -->
                            <span th:if="${item.trialDays != null}"
                                  th:text="#{catalog.trial-badge(${item.trialDays})}"
                                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border border-orange-500/30 bg-orange-500/10 text-orange-300 flex-shrink-0">
                            </span>
                        </div>
                        <p class="text-xs text-slate-500 mt-0.5 line-clamp-2"
                           th:text="${item.description}"></p>
                    </div>
                </div>

                <!-- Precio -->
                <div class="flex items-baseline gap-1 mb-4">
                    <span class="text-xl font-bold text-slate-100"
                          th:text="'€' + ${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                    <th:block th:switch="${item.billingCycle.name()}">
                        <span th:case="'MONTHLY'" class="text-xs text-slate-500" th:text="#{sub.billing.monthly}">/mes</span>
                        <span th:case="'YEARLY'" class="text-xs text-slate-500" th:text="#{sub.billing.yearly}">/año</span>
                        <span th:case="'WEEKLY'" class="text-xs text-slate-500" th:text="#{sub.billing.weekly}">/sem.</span>
                    </th:block>
                </div>

                <!-- Spacer -->
                <div class="flex-1"></div>

                <!-- Footer: acciones -->
                <div class="flex items-center justify-end gap-2 pt-3 border-t border-white/[0.05]">

                    <!-- Enlace cancelación -->
                    <a th:if="${item.cancelUrl != null}"
                       th:href="${item.cancelUrl}"
                       target="_blank" rel="noopener noreferrer"
                       class="card-action cancel flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-orange-400/80 border border-orange-500/20 no-underline">
                        <i class="bi bi-x-circle"></i><span th:text="#{catalog.cancel}">Cancelar</span>
                    </a>

                    <!-- Botón Añadir -->
                    <th:block th:if="${categoryKeyToId[item.categoryKey] != null}">
                        <form th:action="@{/subscriptions/add-from-catalog}" method="post" class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="name"         th:value="${item.name}">
                            <input type="hidden" name="description"  th:value="${item.description}">
                            <input type="hidden" name="price"        th:value="${item.price}">
                            <input type="hidden" name="currency"     th:value="${item.currency}">
                            <input type="hidden" name="billingCycle" th:value="${item.billingCycle}">
                            <input type="hidden" name="categoryId"   th:value="${categoryKeyToId[item.categoryKey]}">
                            <input type="hidden" name="isTrial"      th:value="${item.trialDays != null}">
                            <input th:if="${item.trialDays != null}"
                                   type="hidden" name="trialEndsAt"
                                   th:value="${T(java.time.LocalDate).now().plusDays(item.trialDays)}">
                            <button type="submit"
                                    class="card-action flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-accent hover:bg-accent-hover text-white cursor-pointer shadow-sm shadow-accent/20">
                                <i class="bi bi-plus-lg"></i><span th:text="#{catalog.add}">Añadir</span>
                            </button>
                        </form>
                    </th:block>

                    <!-- Categoría no mapeada -->
                    <th:block th:unless="${categoryKeyToId[item.categoryKey] != null}">
                        <button type="button" disabled
                                th:title="#{catalog.create-cat-first}"
                                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-700/50 text-slate-500 border border-white/[0.06] cursor-not-allowed">
                            <i class="bi bi-plus-lg"></i><span th:text="#{catalog.add}">Añadir</span>
                        </button>
                    </th:block>
                </div>
            </div>
        </div>
    </div>

    <!-- Estado vacío -->
    <div id="catalogNoResults" hidden
         class="glass-card rounded-xl p-16 text-center mt-4">
        <i class="bi bi-search text-5xl text-slate-600 block mb-4"></i>
        <p class="text-slate-400 mb-4" th:text="#{catalog.empty}">No se encontraron servicios</p>
        <button type="button" onclick="clearCatalog()"
                class="card-action edit px-4 py-2 border border-white/[0.1] text-slate-400 hover:text-slate-200 hover:border-white/20 rounded-lg text-sm cursor-pointer"
                th:text="#{catalog.clear}">
            Limpiar filtros
        </button>
    </div>

</div>

<th:block layout:fragment="scripts">
<style>
    /* Chip "pruebas gratuitas": acento naranja en lugar del indigo por defecto. */
    .filter-pill-trial.active {
        border-color: rgba(249,115,22,0.5) !important;
        background: rgba(249,115,22,0.12) !important;
        color: #fdba74 !important;
    }
</style>
<script th:inline="none">
(function () {
    'use strict';

    const searchInput = document.getElementById('catalogSearch');
    const grid        = document.getElementById('catalogGrid');
    const noResults   = document.getElementById('catalogNoResults');

    let activeCat = '';

    function getCards() {
        return grid ? grid.querySelectorAll('.catalog-card[data-name]') : [];
    }

    // Oculta con una breve transición (fade + scale) antes de colapsar el hueco.
    function setCardVisible(card, show) {
        if (show) {
            card.style.display = '';
            card.classList.remove('is-hiding');
        } else if (card.style.display !== 'none' && !card.classList.contains('is-hiding')) {
            card.classList.add('is-hiding');
            window.setTimeout(function () {
                if (card.classList.contains('is-hiding')) card.style.display = 'none';
            }, 150);
        }
    }

    function applyFilters() {
        const text = (searchInput ? searchInput.value : '').toLowerCase().trim();
        const cards = getCards();
        let visible = 0;

        cards.forEach(function (card) {
            const nameData = card.getAttribute('data-name') || '';
            const catData  = card.getAttribute('data-cat') || '';
            const matchesText = !text || nameData.includes(text);
            const matchesCat  = !activeCat || catData === activeCat;
            const show = matchesText && matchesCat;
            setCardVisible(card, show);
            if (show) visible++;
        });

        if (noResults) noResults.hidden = !(visible === 0 && cards.length > 0);
    }

    window.setCatalogCat = function (btn, category) {
        document.querySelectorAll('.filter-pill').forEach(function (p) { p.classList.remove('active'); });
        btn.classList.add('active');
        activeCat = category;
        applyFilters();
    };

    window.clearCatalog = function () {
        if (searchInput) searchInput.value = '';
        const allPill = document.querySelector('.filter-pill[data-cat=""]');
        if (allPill) setCatalogCat(allPill, '');
        else { activeCat = ''; applyFilters(); }
    };

    if (searchInput) searchInput.addEventListener('input', applyFilters);
}());
</script>
</th:block>
</body>
</html>
