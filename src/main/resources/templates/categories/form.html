<!DOCTYPE html>
<!--
  Formulario de categoría — Tailwind CSS dark mode
  Con color picker HTML5, preview en tiempo real y emoji.
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Categoría</title></head>
<body>
<div layout:fragment="content">

    <!-- ── Cabecera ───────────────────────────────────────────────────── -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold tracking-tight text-slate-100 flex items-center gap-2">
            <i class="bi bi-tag text-accent"></i>
            <span th:if="${category.id > 0}">Editar categoría</span>
            <span th:unless="${category.id > 0}">Nueva categoría</span>
        </h1>
        <p class="text-sm text-slate-500 mt-1">Personaliza el nombre, color e icono de la categoría</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-6 items-start">

        <!-- Formulario -->
        <form th:action="${category.id > 0 ? '/categories/' + category.id : '/categories'}"
              method="post"
              class="flex-1 max-w-md w-full">

            <div class="glass-card rounded-xl overflow-hidden">
                <div class="p-6 space-y-5">

                    <!-- Nombre -->
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                            Nombre <span class="text-red-400">*</span>
                        </label>
                        <input type="text" name="name" required
                               th:value="${category.name}"
                               class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                               placeholder="Ej: Entretenimiento, Productividad…"/>
                    </div>

                    <!-- Color -->
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Color</label>
                        <div class="flex items-center gap-3">
                            <input type="color" name="color" id="colorPicker"
                                   th:value="${category.color}"
                                   class="w-12 h-10 rounded-lg border border-white/[0.08] bg-elevated cursor-pointer p-0.5 transition-all duration-200 hover:border-accent/40"/>
                            <input type="text" id="colorText"
                                   th:value="${category.color}"
                                   pattern="#[0-9a-fA-F]{6}"
                                   placeholder="#6366f1"
                                   readonly
                                   class="flex-1 px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-300 font-mono focus:outline-none cursor-default"/>
                        </div>
                    </div>

                    <!-- Icono emoji -->
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Icono (emoji)</label>
                        <input type="text" name="icon" maxlength="10"
                               th:value="${category.icon}"
                               class="w-full px-3 py-2.5 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                               placeholder="🤖"/>
                        <p class="text-xs text-slate-600 mt-1.5">Opcional. Puedes usar un emoji.</p>
                    </div>
                </div>

                <div class="px-6 py-4 border-t border-white/[0.06] flex items-center gap-3">
                    <button type="submit"
                            class="flex items-center gap-2 px-5 py-2.5 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer shadow-lg shadow-accent/20">
                        <i class="bi bi-floppy"></i>Guardar
                    </button>
                    <a th:href="@{/categories}"
                       class="px-5 py-2.5 border border-white/[0.1] text-slate-400 hover:text-slate-200 hover:border-white/20 text-sm font-medium rounded-lg transition-all duration-200 no-underline">
                        Cancelar
                    </a>
                </div>
            </div>
        </form>

        <!-- Preview de la categoría -->
        <div class="w-full max-w-xs">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3">Preview</p>
            <div class="glass-card rounded-xl overflow-hidden" id="previewCard">
                <div class="flex flex-col" id="previewBorder" style="border-left: 4px solid #6366f1;">
                    <div class="p-5">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl mb-4"
                             id="previewIconBg" style="background: rgba(99,102,241,0.13);">
                            <span id="previewIcon">📁</span>
                        </div>
                        <div class="font-bold text-slate-100 text-base mb-2" id="previewName">Nombre</div>
                        <div class="flex items-center gap-2">
                            <span class="w-4 h-4 rounded flex-shrink-0" id="previewSwatch"
                                  style="background: #6366f1;"></span>
                            <code class="text-xs text-slate-500 font-mono" id="previewHex">#6366f1</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const colorPicker  = document.getElementById('colorPicker');
        const colorText    = document.getElementById('colorText');
        const nameInput    = document.querySelector('input[name=name]');
        const iconInput    = document.querySelector('input[name=icon]');
        const previewBorder  = document.getElementById('previewBorder');
        const previewIconBg  = document.getElementById('previewIconBg');
        const previewIcon    = document.getElementById('previewIcon');
        const previewName    = document.getElementById('previewName');
        const previewSwatch  = document.getElementById('previewSwatch');
        const previewHex     = document.getElementById('previewHex');

        function updatePreview() {
            const color = colorPicker.value || '#6366f1';
            const name  = nameInput.value.trim() || 'Nombre';
            const icon  = iconInput.value.trim() || '📁';

            colorText.value = color;
            previewBorder.style.borderLeftColor = color;
            previewIconBg.style.background = color + '22';
            previewSwatch.style.background = color;
            previewHex.textContent = color;
            previewName.textContent = name;
            previewIcon.textContent = icon;
        }

        colorPicker.addEventListener('input', updatePreview);
        nameInput.addEventListener('input', updatePreview);
        iconInput.addEventListener('input', updatePreview);

        // Inicializar preview con valores actuales
        updatePreview();
    </script>

</div>
</body>
</html>
