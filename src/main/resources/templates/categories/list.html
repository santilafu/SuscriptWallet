<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="#{cat.title}">Categorías</title></head>
<body>
<div layout:fragment="content">

    <!-- ── Mensaje de error ───────────────────────────────────────────── -->
    <div th:if="${errorMessage}"
         class="flex items-center gap-3 p-4 mb-6 rounded-xl border border-red-500/30 bg-red-500/10 text-red-300">
        <i class="bi bi-exclamation-triangle-fill text-red-400 flex-shrink-0"></i>
        <span class="text-sm" th:text="${errorMessage}"></span>
    </div>

    <!-- ── Cabecera ──────────────────────────────────────────────────── -->
    <div class="flex items-center justify-between mb-10">
        <div>
            <h1 class="text-[1.6rem] font-bold text-slate-100 leading-tight" style="letter-spacing:-0.03em;">
                <span th:text="#{cat.title}">Categorías</span>
            </h1>
            <p class="text-sm mt-1" style="color:#4a5a78;"
               th:text="#{cat.count(${categories.size()})}"></p>
        </div>
        <a th:href="@{/categories/new}"
           class="flex items-center gap-2 px-4 py-2.5 bg-accent hover:bg-accent-hover text-white text-sm font-semibold rounded-xl transition-all no-underline"
           style="box-shadow:0 1px 8px rgba(99,102,241,0.4),0 0 0 1px rgba(99,102,241,0.2);">
            <i class="bi bi-plus-lg text-xs"></i><span th:text="#{cat.new}">Nueva</span>
        </a>
    </div>

    <!-- ── Grid de cards ──────────────────────────────────────────────── -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
         th:if="${!categories.isEmpty()}">

        <div th:each="cat : ${categories}"
             class="glass-card rounded-xl overflow-hidden flex flex-col"
             style="transition:transform 0.18s cubic-bezier(0.4,0,0.2,1),box-shadow 0.18s cubic-bezier(0.4,0,0.2,1);"
             onmouseenter="this.style.transform='translateY(-2px)'"
             onmouseleave="this.style.transform='translateY(0)'">

            <div class="flex flex-col flex-1"
                 th:style="'border-left: 3px solid ' + ${cat.color}">

                <div class="p-5 flex-1">
                    <!-- Icono sin fondo redondo gigante: cuadrado pequeño -->
                    <div class="w-9 h-9 rounded-lg flex items-center justify-center text-lg mb-4"
                         th:style="'background:' + ${cat.color} + '1a; border:1px solid ' + ${cat.color} + '33;'">
                        <span th:text="${cat.icon.isEmpty() ? '📁' : cat.icon}"></span>
                    </div>
                    <div class="font-bold text-sm mb-2.5" style="color:#dde4f0;letter-spacing:-0.01em;" th:text="${cat.name}"></div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-3 h-3 rounded flex-shrink-0"
                              th:style="'background:' + ${cat.color}"></span>
                        <code class="text-xs font-mono" style="color:#3d4d66;" th:text="${cat.color}"></code>
                    </div>
                </div>

                <!-- Acciones -->
                <div class="px-5 py-2.5 flex items-center gap-1.5" style="border-top:1px solid rgba(255,255,255,0.04);">
                    <a th:href="@{/categories/{id}/edit(id=${cat.id})}"
                       class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all no-underline"
                       style="color:#64748b;border:1px solid rgba(255,255,255,0.07);"
                       onmouseenter="this.style.color='#cbd5e1';this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.12)';"
                       onmouseleave="this.style.color='#64748b';this.style.background='transparent';this.style.borderColor='rgba(255,255,255,0.07)';">
                        <i class="bi bi-pencil"></i><span th:text="#{cat.action.edit}">Editar</span>
                    </a>
                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                          th:attr="onsubmit='return confirm(\'' + #{cat.action.delete-confirm} + '\')'">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit"
                                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all cursor-pointer"
                                style="color:rgba(248,113,113,0.55);border:1px solid rgba(239,68,68,0.15);background:transparent;"
                                onmouseenter="this.style.color='#f87171';this.style.background='rgba(239,68,68,0.08)';this.style.borderColor='rgba(239,68,68,0.3)';"
                                onmouseleave="this.style.color='rgba(248,113,113,0.55)';this.style.background='transparent';this.style.borderColor='rgba(239,68,68,0.15)';">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Estado vacío -->
    <div th:if="${categories.isEmpty()}"
         class="glass-card rounded-xl p-16 text-center">
        <i class="bi bi-tags text-5xl text-slate-600 block mb-4"></i>
        <p class="text-slate-400 mb-4" th:text="#{cat.empty}">No hay ninguna categoría todavía</p>
        <a th:href="@{/categories/new}"
           class="inline-flex items-center gap-2 px-4 py-2 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 no-underline">
            <i class="bi bi-plus-lg"></i><span th:text="#{cat.empty.add}">Crear la primera</span>
        </a>
    </div>

</div>
</body>
</html>
