spring.application.name=SubIA

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/subia
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=subia_user
spring.datasource.password=subia_pass

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Flyway gestiona las migraciones del esquema de base de datos
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Desactiva la inicializacion automatica de Spring Boot con data.sql / schema.sql
# porque Flyway ya se encarga de todo el esquema y los datos iniciales
spring.sql.init.mode=never

# Thymeleaf
spring.thymeleaf.cache=false

server.port=8081

# JWT
jwt.secret=${JWT_SECRET:SubIA-dev-secret-key-32chars-min}
jwt.access-token-ttl-minutes=15
jwt.refresh-token-ttl-days=30

# Auth (single user -- APP_AUTH_PASSWORD debe ser hash BCrypt)
app.auth.username=admin
app.auth.password=${APP_AUTH_PASSWORD:password}

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Rate limiting
rate-limit.requests-per-minute=100
