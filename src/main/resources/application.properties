spring.application.name=SubIA

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:subia;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway — gestiona las migraciones del esquema de base de datos
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Desactiva la inicialización automática de Spring Boot con data.sql / schema.sql
# porque Flyway ya se encarga de todo el esquema y los datos iniciales
spring.sql.init.mode=never

# Thymeleaf
spring.thymeleaf.cache=false

server.port=8081
